name: Broken Link Checker

# Checks all links in your HTML files are still reachable.
# Runs:
#   - On every push to main (catches newly broken links immediately)
#   - Every Monday at 8 AM UTC (catches links that go dead over time)
#   - Manually from the Actions tab (workflow_dispatch)
#
# LinkedIn is excluded — it blocks automated requests (returns 403/999).
# mailto: and tel: links are excluded as they cannot be HTTP-checked.
# HTTP 429 (rate-limited) is accepted as "not broken".

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check all links in HTML files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            --exclude-all-private
            --exclude "^mailto:"
            --exclude "^tel:"
            --exclude "linkedin\.com"
            "./**/*.html"
          fail: true
