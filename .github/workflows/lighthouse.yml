name: Lighthouse CI

# Runs a Google Lighthouse audit on every push to main.
# Checks Performance, Accessibility, SEO, and Best Practices scores.
# Results are uploaded as a workflow artifact and also to a temporary
# public URL (printed in the job summary) so you can view the full report.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
