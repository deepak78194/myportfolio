name: Deploy to GitHub Pages

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP REQUIRED before this workflow can deploy:
#   1. Go to your repo → Settings → Pages
#   2. Under "Source", select "GitHub Actions"
#   3. Save — from then on, every push to main will auto-deploy the site.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch: # also allows manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; skip queued runs, never cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
